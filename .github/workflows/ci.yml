name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  acceptance:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Check syntax
        run: npm run check

      - name: Run acceptance
        run: npm run acceptance
