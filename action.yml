name: Runcap Mission Control
description: Policy, budget enforcement and trusted outcome evidence for AI coding agents.
branding:
  icon: shield
  color: green
inputs:
  policy:
    description: Path to the mission policy file.
    required: false
    default: .runcap/mission.yaml
  receipt:
    description: Path to an existing outcome receipt to grade. If omitted, grades the latest receipt under .runcap/outcomes.
    required: false
runs:
  using: composite
  steps:
    - name: Install Runcap dependencies
      shell: bash
      run: npm install --omit=dev --no-audit --no-fund --prefix "$GITHUB_ACTION_PATH"
    - name: Grade mission against policy
      shell: bash
      run: node "$GITHUB_ACTION_PATH/bin/runcap.mjs" ci --policy "${{ inputs.policy }}" ${{ inputs.receipt && format('--receipt {0}', inputs.receipt) || '' }}
